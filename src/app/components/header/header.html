<header class="app-header">
  <h1 class="app-title">{{ title() }}</h1>

  <div class="user-menu">
    <button
      class="user-button"
      type="button"
      aria-label="User menu"
      [attr.aria-expanded]="showUserMenu()"
      aria-haspopup="menu"
      (click)="toggleUserMenu()"
    >
      <img src="\assets\icons\user_icon.svg" alt="Ícone do usuário" class="user-icon" width="20" height="20">
    </button>

    @if (showUserMenu()) {
      <div class="user-menu-panel" role="menu">
        <button type="button" class="user-menu-item" role="menuitem" (click)="logout()">
          Sair
        </button>
      </div>
    }
  </div>
</header>
