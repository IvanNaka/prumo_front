<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
          <path d="M2 17l10 5 10-5M2 12l10 5 10-5"></path>
        </svg>
      </div>
      <h1 class="login-title">Prumo</h1>
    </div>

    <form (ngSubmit)="handleSubmit()" class="login-form">
      <div class="field">
        <label class="field-label">Email</label>
        <div class="field-control field-control-icon">
          <span class="field-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2"></rect>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
            </svg>
          </span>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="seu@email.com"
            class="field-input field-input-icon"
            required
          />
        </div>
      </div>

      <div class="field">
        <label class="field-label">Senha</label>
        <div class="field-control field-control-icon field-control-password">
          <span class="field-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </span>

          <input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            class="field-input field-input-icon field-input-password"
            required
          />

          <button
            type="button"
            (click)="togglePasswordVisibility()"
            class="password-toggle"
            [attr.aria-label]="showPassword ? 'Ocultar senha' : 'Mostrar senha'"
          >
            @if (showPassword) {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-4-11-4s1.6-2.1 4.3-4.3m2.6-2.6A5.07 5.07 0 0 1 12 6c4 0 7.3 2.2 10 5s-1.6 2.1-4.3 4.3m2.6 2.6L21 21"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            } @else {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            }
          </button>
        </div>
      </div>

      <div class="form-row">
        <label class="checkbox">
          <input type="checkbox" class="checkbox-input" />
          <span class="checkbox-label">Lembrar de mim</span>
        </label>

        <a href="#" class="text-link">Esqueceu a senha?</a>
      </div>

      <button type="submit" class="submit-button">Entrar</button>

      <p class="signup-text">
        Não tem uma conta?
        <a href="#" class="text-link text-link-strong">Cadastre-se</a>
      </p>
    </form>
  </div>
</div>
