<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
        <img src="/assets/icons/prumo_logo_sb.svg" > 
    </div>

    <div class="login-form">
      <div class="field">
        <div class="google-signin-slot" #googleButton></div>
        @if (!googleClientConfigured) {
          <p class="field-error">
            Configure `googleClientId` em `environment.ts` para habilitar o login com Google.
          </p>
        }
      </div>
    </div>
  </div>
</div>
