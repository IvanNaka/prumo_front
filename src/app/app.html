@if (!isLoggedIn()) {
  @if (authError()) {
    <div class="auth-error-banner">{{ authError() }}</div>
  }
  <app-login (onLogin)="handleLogin($event)"></app-login>
} @else {
  <div class="app-shell">
    <app-sidebar [activeItem]="activeView()" (onNavigate)="handleNavigate($event)"></app-sidebar>

    <div class="app-content">
      <app-header [title]="titles[activeView()]"></app-header>

      <main class="app-main">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
}
